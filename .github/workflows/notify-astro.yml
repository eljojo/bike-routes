name: Notify Astro Site

on:
  push:
    branches: [main, staging]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed cities
        id: detect
        run: |
          # Top-level directories with config.yml are cities
          CITIES=$(git diff --name-only HEAD~1 HEAD | grep -oP '^[^/]+(?=/)' | sort -u | while read dir; do
            [ -f "$dir/config.yml" ] && echo "$dir"
          done | paste -sd ',' -)
          echo "cities=${CITIES:-ottawa}" >> "$GITHUB_OUTPUT"

      - name: Extract app branch from commit
        if: github.ref_name == 'staging'
        id: branch
        run: |
          BRANCH=$(git log -1 --format='%b' | grep -oP '^App-Branch:\s*\K.+' || echo '')
          echo "app_branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Trigger astro rebuild
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            EVENT_TYPE="staging-data-updated"
          else
            EVENT_TYPE="data-updated"
          fi

          CITIES="${{ steps.detect.outputs.cities }}"
          APP_BRANCH="${{ steps.branch.outputs.app_branch }}"
          PAYLOAD="{\"event_type\": \"$EVENT_TYPE\", \"client_payload\": {\"city\": \"$CITIES\""
          if [ -n "$APP_BRANCH" ]; then
            PAYLOAD="$PAYLOAD, \"app_branch\": \"$APP_BRANCH\""
          fi
          PAYLOAD="$PAYLOAD}}"

          curl -X POST \
            -H "Authorization: token ${{ secrets.ASTRO_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/eljojo/bike-app-astro/dispatches \
            -d "$PAYLOAD"

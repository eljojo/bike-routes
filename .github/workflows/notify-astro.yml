name: Notify Astro Site

on:
  push:
    branches: [main, staging]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger astro rebuild
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            EVENT_TYPE="staging-data-updated"
          else
            EVENT_TYPE="data-updated"
          fi
          curl -X POST \
            -H "Authorization: token ${{ secrets.ASTRO_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/eljojo/bike-app-astro/dispatches \
            -d "{\"event_type\": \"$EVENT_TYPE\"}"
